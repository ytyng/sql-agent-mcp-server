# ログファイルのパス
# 解決順: YAML (この値) > 環境変数 SQL_AGENT_LOG_FILE_PATH > デフォルト (/tmp/sql-agent/sql-agent-mcp-server.log)
log_file_path: /tmp/sql-agent/sql-agent-mcp-server.log

sql_servers:
  - name: dev-postgres
    description: "開発環境の PostgreSQL サーバー"
    engine: postgres
    host: localhost
    port: 5432
    schema: development_db
    user: dev_user
    password: your_password_here

  - name: dev-mysql
    description: "開発環境の MySQL サーバー"
    engine: mysql
    host: localhost
    port: 3306
    schema: test_db
    user: mysql_user
    password: your_mysql_password

  - name: production-db
    description: "本番環境のデータベースサーバー"
    engine: mysql
    host: db.example.com
    port: 3306
    schema: production_db
    user: prod_user
    password: production_password

  - name: remote-db-with-ssh
    description: "SSH トンネル経由でアクセスするリモートデータベース"
    engine: postgres
    host: localhost  # SSH トンネル経由の場合は localhost を指定
    port: 5432
    schema: remote_db
    user: remote_user
    password: remote_password
    ssh_tunnel:
      host: ssh.example.com
      port: 22
      user: ssh_user
      password: ssh_password  # または private_key_path を使用
      # private_key_path: ~/.ssh/id_rsa  # パスワードの代わりに秘密鍵を使用する場合
      # private_key_passphrase: key_passphrase  # 秘密鍵にパスフレーズがある場合

# --- テンプレートで接続情報を共有する例 ---
# 同一 DB インスタンス上の複数 schema を扱う場合、共通の接続情報 (engine /
# host / port / user / password / ssh_tunnel 等) を sql_server_templates に
# まとめ、sql_servers 側では `template: <名前>` で継承して schema だけ変える。
# サーバー側で指定したキーはテンプレートの同名キーを上書きする (シャローマージ)。
sql_server_templates:
  - name: my-awesome-sql-host
    engine: mysql
    host: db.example.com
    port: 3306
    user: shared_user
    password: shared_password

# 上のテンプレートを使うと、以下のように重複を書かずに複数 schema を登録できる:
#
# sql_servers:
#   - template: my-awesome-sql-host
#     name: my-app-db
#     description: "アプリ本体の DB"
#     schema: app_db
#
#   - template: my-awesome-sql-host
#     name: my-log-db
#     description: "ログ用 DB"
#     schema: log_db
